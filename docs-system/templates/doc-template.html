<script>
const SIDEBAR_DATA = {{SIDEBAR_JSON}};
const CURRENT_PATH = '{{CURRENT_PATH}}';

// 等 Docusaurus 加载完成后执行
document.addEventListener('DOMContentLoaded', function() {
  if (typeof SIDEBAR_DATA !== 'undefined') {
    renderSidebar(SIDEBAR_DATA, CURRENT_PATH);
  }
});
function renderSidebar(data, currentPath) {
  var root = document.getElementById('sidebarRoot');
  if (!root) return;
  var html = '';
  for (var i = 0; i < data.length; i++) {
    html += renderItem(data[i], currentPath);
  }
  root.innerHTML = html;
  var active = root.querySelector('.sidebar-link.active');
  if (active) {
    var parent = active.closest('.sidebar-items');
    while (parent) {
      parent.classList.remove('collapsed');
      var header = parent.previousElementSibling;
      if (header && header.classList.contains('sidebar-category-header')) {
        var arrow = header.querySelector('.arrow');
        if (arrow) arrow.classList.add('open');
      }
      parent = parent.parentElement ? parent.parentElement.closest('.sidebar-items') : null;
    }
  }
}
function renderItem(item, currentPath) {
  if (item.type === 'category') {
    var expanded = isCatActive(item, currentPath);
    var arrowCls = expanded ? 'arrow open' : 'arrow';
    var itemsCls = expanded ? 'sidebar-items' : 'sidebar-items collapsed';
    var h = '<div class="sidebar-category"><div class="sidebar-category-header" onclick="toggleCat(this)">' +
      item.label + '<span class="' + arrowCls + '">▶</span></div><ul class="' + itemsCls + '">';
    for (var j = 0; j < item.items.length; j++) {
      h += '<li>' + renderItem(item.items[j], currentPath) + '</li>';
    }
    h += '</ul></div>';
    return h;
  } else {
    var act = item.href === currentPath;
    var cls = act ? 'sidebar-link active' : 'sidebar-link';
    return '<a class="' + cls + '" href="' + item.href + '">' + item.label + '</a>';
  }
}
function isCatActive(cat, path) {
  for (var k = 0; k < cat.items.length; k++) {
    var sub = cat.items[k];
    if (sub.type === 'category') { if (isCatActive(sub, path)) return true; }
    else if (sub.href === path) return true;
  }
  return false;
}
window.toggleCat = function(header) {
  var items = header.nextElementSibling;
  if (!items || !items.classList.contains('sidebar-items')) return;
  items.classList.toggle('collapsed');
  var arrow = header.querySelector('.arrow');
  if (arrow) arrow.classList.toggle('open');
};
</script>
